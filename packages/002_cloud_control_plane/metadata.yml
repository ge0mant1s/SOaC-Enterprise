package:
  id: SOAC-PKG-002
  name: Cloud Control Plane Defense
  version: 1.0.0
  status: public
  golden_platforms:
    - sentinel_kql
    - crowdstrike_logscale
  scope:
    - aws
    - azure
    - gcp
    - entra_id
  tags:
    - cloud-control-plane
    - iam-backdoor
    - logging-tampering
    - snapshot-exfiltration
    - cross-cloud-pivot
    - persistence
  assumptions:
    - AWS CloudTrail is enabled and ingested into SIEM.
    - Azure Activity Logs and Entra Audit Logs are ingested into Sentinel.
    - GCP Audit Logs are ingested (optional but recommended).
  autonomy_tiers:
    tier0: observe
    tier1: constrain
    tier2: contain
    tier3: recover
