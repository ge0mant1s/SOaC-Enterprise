# AWS Service Control Policy (SCP) Guardrails -- SOaC Package 002
# Apply at the AWS Organization or OU level.

guardrails:
  - name: Deny CloudTrail Stop/Delete
    effect: Deny
    actions:
      - cloudtrail:StopLogging
      - cloudtrail:DeleteTrail
      - cloudtrail:UpdateTrail
    condition: "Not an approved automation role"

  - name: Deny IAM User Creation without MFA
    effect: Deny
    actions:
      - iam:CreateUser
      - iam:CreateAccessKey
    condition: "MultiFactorAuthPresent != true"

  - name: Deny Public Snapshot Sharing
    effect: Deny
    actions:
      - ec2:ModifySnapshotAttribute
    condition: "Snapshot attribute set to public"

  - name: Deny Root Account Usage
    effect: Deny
    actions:
      - "*"
    condition: "aws:PrincipalArn == root"
