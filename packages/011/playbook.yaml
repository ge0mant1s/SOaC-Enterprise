apiVersion: claw.soac.io/v1
kind: Playbook

metadata:
  name: "insider-threat-response"
  version: "1.0.0"
  author: "SOaC Community"
  created: "2026-03-16T00:00:00Z"
  tags: ["pkg-011", "automated-response"]
  mitre_attack: ["T1078", "T1530", "T1213"]
  severity: "HIGH"
  package_id: "pkg-011"

spec:
  description: "Increase monitoring fidelity, restrict access scope, preserve audit trail, and escalate to CISO with behavioral evidence package."

  trigger:
    source: "BODY"
    conditions:
      - field: "detection_type"
        operator: "eq"
        value: "insider_threat_anomaly"
    cooldown: "5m"

  inputs:
    - name: "detection_event"
      type: "object"
      required: true
      description: "The detection event payload from The Body"
    - name: "target_identity"
      type: "string"
      required: true
      description: "The target user or entity identifier"

  steps:
    - id: "step-1"
      name: "increase_monitoring"
      action: "api_call"
      target: "BODY"
      parameters:
          action: "elevate_monitoring"
          scope: "user"
      timeout: "30s"
      retry:
        max_attempts: 2
        backoff: "exponential"
      on_failure: "halt"
    - id: "step-2"
      name: "restrict_access"
      action: "containment"
      target: "EDGE"
      parameters:
          action: "reduce_access_scope"
          level: "read_only"
      timeout: "30s"
      retry:
        max_attempts: 2
        backoff: "exponential"
      on_failure: "skip"
    - id: "step-3"
      name: "escalate_to_ciso"
      action: "notification"
      target: "INTERNAL"
      parameters:
          channel: "#ciso-insider-threat"
      timeout: "30s"
      retry:
        max_attempts: 2
        backoff: "exponential"
      on_failure: "skip"

  outputs:
    - name: "containment_status"
      type: "string"
      description: "Final status of the containment action"
    - name: "affected_entities"
      type: "object"
      description: "List of entities affected by the response"

  rollback:
    steps:
      - id: "rollback-1"
        name: "restore_access"
        action: "api_call"
        target: "EDGE"
        parameters:
          action: "restore_access_scope"

  governance:
    requires_brain_oversight: false
    max_blast_radius: "org"
    audit_level: "verbose"
    human_approval_required: false
