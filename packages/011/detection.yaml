apiVersion: soac.io/v1
kind: DetectionRule

metadata:
  name: "insider-threat-anomaly-detection"
  version: "1.0.0"
  author: "SOaC Community"
  created: "2026-03-16T00:00:00Z"
  package_id: "pkg-011"
  mitre_attack:
    - technique: "T1078"
      tactic: "Defense Evasion"
    - technique: "T1530"
      tactic: "Collection"
    - technique: "T1213"
      tactic: "Collection"
  severity: "HIGH"
  confidence: "HIGH"
  tags: ["pkg-011", "defense-evasion"]

spec:
  description: "Detects insider threat indicators through behavioral anomalies including off-hours access, bulk data downloads, and access pattern deviations correlated with HR risk signals."

  data_sources:
    - name: "UEBA platform"
      type: "api"
      fields: ["user_id", "risk_score", "anomaly_type", "access_time", "resource_accessed"]

  logic:
    type: "anomaly"
    timewindow: "5m"
    implementations:
      sigma:
        rule: |
          title: Insider Threat - Anomalous Data Access Pattern
          status: experimental
          logsource:
            product: ueba
          detection:
            selection:
              anomaly_type:
                - bulk_download
                - off_hours_access
                - privilege_escalation
            filter:
              risk_score|gt: 80
            condition: selection and filter
          level: high

  tuning:
    threshold: 1
    whitelist: []
    noise_reduction: "dedup_by_user"

  response:
    playbook: "insider-threat-response"
    escalation: "auto"
    notify: ["soc-team"]

  test_cases:
    - name: "positive-match"
      description: "Simulated defense evasion event that should trigger alert"
      input:
        event_type: "insider_threat_anomaly"
        severity: "HIGH"
      expected_result: "alert"
