apiVersion: claw.soac.io/v1
kind: Playbook
metadata:
  name: apt37-hankook-phantom-defense-response
  version: "1.0.0"
  author: "SOaC CLAW Security Team"
  created: "2024-01-15T10:30:00Z"
  tags: ["apt37", "famous-chollima", "rokrat", "spear-phishing", "powershell", "c2", "exfiltration"]
  mitre_attack: ["T1566.001", "T1566.002", "T1059.001", "T1567.002", "T1573.001"]
  severity: "critical"
  package_id: "pkg-015"

spec:
  description: "Automated response playbook for APT37 (Famous Chollima) Operation HanKook Phantom Defense campaign targeting endpoints and SaaS environments through spear-phishing, PowerShell execution, RokRat backdoor deployment, and cloud-based C2 communications"
  
  trigger:
    source: "siem"
    conditions:
      - "alert.threat_actor == 'APT37' OR alert.malware_family == 'RokRat'"
      - "alert.technique IN ['T1566.001', 'T1566.002', 'T1059.001', 'T1567.002', 'T1573.001']"
      - "alert.severity >= 'high'"
    cooldown: "300s"

  inputs:
    - name: "affected_endpoints"
      type: "array"
      required: true
      description: "List of compromised endpoint identifiers"
    - name: "suspicious_email_addresses"
      type: "array"
      required: true
      description: "Email addresses involved in spear-phishing campaign"
    - name: "c2_domains"
      type: "array"
      required: false
      description: "Known C2 domains for blocking"
    - name: "file_hashes"
      type: "array"
      required: false
      description: "IOCs including LNK files and RokRat samples"

  steps:
    - name: "isolate_compromised_endpoints"
      action: "endpoint.isolate"
      target: "{{ inputs.affected_endpoints }}"
      parameters:
        isolation_type: "network"
        preserve_management: true
        reason: "APT37 RokRat infection containment"
      timeout: "120s"
      retry: 2
      on_failure: "continue"

    - name: "block_malicious_indicators"
      action: "network.block_iocs"
      target: "firewall"
      parameters:
        domains: "{{ inputs.c2_domains }}"
        file_hashes: "{{ inputs.file_hashes }}"
        block_duration: "24h"
        rule_priority: "high"
      timeout: "60s"
      retry: 3
      on_failure: "escalate"

    - name: "terminate_powershell_processes"
      action: "endpoint.kill_processes"
      target: "{{ inputs.affected_endpoints }}"
      parameters:
        process_names: ["powershell.exe", "cmd.exe"]
        filter_suspicious: true
        force_terminate: true
      timeout: "90s"
      retry: 2
      on_failure: "continue"

    - name: "collect_forensic_artifacts"
      action: "endpoint.collect_evidence"
      target: "{{ inputs.affected_endpoints }}"
      parameters:
        artifacts: ["memory_dump", "disk_image", "registry_hives", "event_logs"]
        compression: true
        encryption: true
      timeout: "1800s"
      retry: 1
      on_failure: "continue"

    - name: "analyze_email_campaign"
      action: "email.investigate_phishing"
      target: "email_security"
      parameters:
        sender_addresses: "{{ inputs.suspicious_email_addresses }}"
        search_timeframe: "7d"
        quarantine_similar: true
        extract_attachments: true
      timeout: "300s"
      retry: 2
      on_failure: "continue"

    - name: "hunt_lateral_movement"
      action: "siem.threat_hunt"
      target: "security_platform"
      parameters:
        hunt_queries: ["rokrat_persistence", "apt37_ttps", "powershell_anomalies"]
        timeframe: "72h"
        scope: "enterprise"
      timeout: "600s"
      retry: 1
      on_failure: "continue"

    - name: "remediate_persistence_mechanisms"
      action: "endpoint.remove_persistence"
      target: "{{ inputs.affected_endpoints }}"
      parameters:
        registry_cleanup: true
        scheduled_tasks: true
        startup_items: true
        services: true
      timeout: "180s"
      retry: 2
      on_failure: "manual_intervention"

    - name: "escalate_to_incident_response"
      action: "notification.escalate"
      target: "incident_response_team"
      parameters:
        severity: "critical"
        threat_actor: "APT37"
        campaign: "Operation HanKook Phantom Defense"
        affected_systems: "{{ inputs.affected_endpoints }}"
        recommended_actions: ["forensic_analysis", "threat_intelligence_sharing", "attribution_analysis"]
      timeout: "30s"
      retry: 3
      on_failure: "log_error"

  outputs:
    - name: "isolation_status"
      description: "Status of endpoint isolation operations"
    - name: "blocked_indicators_count"
      description: "Number of IOCs successfully blocked"
    - name: "forensic_collection_paths"
      description: "Paths to collected forensic artifacts"
    - name: "lateral_movement_findings"
      description: "Results from threat hunting activities"
    - name: "escalation_ticket_id"
      description: "Incident response ticket identifier"

  rollback:
    steps:
      - name: "restore_network_access"
        action: "endpoint.restore_connectivity"
        target: "{{ inputs.affected_endpoints }}"
        parameters:
          verify_clean: true
          gradual_restore: true
      - name: "remove_temporary_blocks"
        action: "network.remove_blocks"
        target: "firewall"
        parameters:
          rule_tags: ["apt37_response", "temporary"]