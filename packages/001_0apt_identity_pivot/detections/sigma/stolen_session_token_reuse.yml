title: Stolen Session Token Reuse Detection
id: f6a7b8c9-d0e1-2345-f012-3456789abcde
status: stable
level: critical
description: |
  Detects reuse of stolen session tokens by identifying authentication events
  where the same session cookie or token is used from a different IP address
  than the original authentication. Indicates T1539 session token theft.
author: SOaC Community
date: 2026/03/28
tags:
  - attack.credential_access
  - attack.t1539
  - attack.defense_evasion
  - attack.t1078.004
logsource:
  product: okta
  service: system
detection:
  selection_session:
    eventType:
      - 'user.session.start'
      - 'app.generic.unauth_app_access_attempt'
  selection_token_replay:
    debugContext.debugData.requestUri|contains: '/api/v1/sessions'
  condition: selection_session or selection_token_replay
falsepositives:
  - Network address translation changing client IPs
  - Load balancer IP changes
fields:
  - actor.alternateId
  - client.ipAddress
  - authenticationContext.externalSessionId
  - debugContext.debugData.requestUri
