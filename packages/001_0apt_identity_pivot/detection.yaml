apiVersion: soac.io/v1
kind: DetectionRule

metadata:
  name: "aitm-session-hijack-detection"
  version: "1.0.0"
  author: "SOaC Community"
  created: "2026-03-16T00:00:00Z"
  package_id: "pkg-001"
  mitre_attack:
    - technique: "T1557.001"
      tactic: "Credential Access"
    - technique: "T1078.004"
      tactic: "Defense Evasion"
    - technique: "T1539"
      tactic: "Credential Access"
  severity: "CRITICAL"
  confidence: "HIGH"
  tags: ["pkg-001", "credential-access"]

spec:
  description: "Detects Adversary-in-the-Middle session hijacking via impossible travel and multi-IP session anomalies in Okta and Azure AD."

  data_sources:
    - name: "Okta System Log"
      type: "api"
      fields: ["eventType", "actor.alternateId", "client.ipAddress", "client.geographicalContext"]

  logic:
    type: "correlation"
    timewindow: "5m"
    implementations:
      sigma:
        rule: |
          title: AitM Session Hijack via Impossible Travel
          status: experimental
          logsource:
            product: okta
            service: system
          detection:
            selection:
              eventType: user.session.start
            condition: selection | count(client.ipAddress) by actor.alternateId > 3
          level: critical

  tuning:
    threshold: 1
    whitelist: []
    noise_reduction: "dedup_by_user"

  response:
    playbook: "revoke-compromised-sessions"
    escalation: "auto"
    notify: ["soc-team"]

  test_cases:
    - name: "positive-match"
      description: "Simulated credential access event that should trigger alert"
      input:
        event_type: "aitm_session_hijack"
        severity: "CRITICAL"
      expected_result: "alert"
