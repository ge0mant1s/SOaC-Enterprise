apiVersion: soac.io/v1
kind: Policy
metadata:
  name: ai-ml-supply-chain-security
  package_id: pkg-012
  version: "1.0.0"
  author: SOaC Community
  scope: environment

spec:
  description: >
    Governance policy outlining security requirements and controls for
    software and AI model supply chain integrity, focusing on Python 
    environments and AI/ML library dependencies.

  package_management:
    approved_registries:
      - name: PyPI
        url: https://pypi.org
        verification: signature_and_hash
      - name: Internal Mirror
        url: https://pypi.internal.company.com
        verification: hash_only
    
    blocked_registries:
      - "*.githubusercontent.com"  # Block direct GitHub installs
      - "*.s3.amazonaws.com"       # Block direct S3 installs
    
    pinning_policy: strict  # All packages must be version-pinned
    lockfile_required: true  # requirements.txt or poetry.lock mandatory
    
    vulnerability_scanning:
      tool: safety  # or snyk, grype
      frequency: pre_deploy
      block_severity: high
      exceptions_require_approval: true

  runtime_controls:
    network_restrictions:
      allowed_outbound:
        - "api.openai.com:443"
        - "api.anthropic.com:443"
        - "pypi.org:443"
      blocked_outbound:
        - "*.litellm-telemetry.io"
        - "*.ai-proxy-cdn.com"
        - "*.ml-analytics-pipe.net"
    
    file_integrity_monitoring:
      paths:
        - "/usr/lib/python*/site-packages/"
        - "/usr/local/lib/python*/site-packages/"
      alert_on:
        - new_pth_files
        - modified_existing_packages
        - unexpected_binaries
    
    secrets_management:
      provider: azure_keyvault  # or aws_ssm, hashicorp_vault
      rotation_frequency: 90d
      never_in_environment_variables: true
      never_in_source_code: true
      scan_tool: trufflehog

  incident_response:
    auto_containment: true
    playbook_ref: "isolate-and-rotate-litellm-credentials"
    escalation_path:
      - level: 1
        team: soc
        sla: 15m
      - level: 2
        team: security-engineering
        sla: 1h
      - level: 3
        team: ciso
        sla: 4h

  compliance:
    frameworks:
      - NIST_CSF_2.0
      - SOC2_Type2
      - ISO_27001
    audit_frequency: quarterly
    evidence_retention: 365d
