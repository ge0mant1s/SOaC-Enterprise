# SOaC CLAW Playbook — LiteLLM Supply Chain: Isolate & Rotate Credentials
# Triggered when supply chain compromise is confirmed on a host.
# Automatically isolates the host, rotates all exposed credentials,
# and notifies the SOC team.

name: isolate-and-rotate-litellm-credentials
version: "1.0.0"
description: "Emergency credential rotation and host isolation for LiteLLM supply chain compromise"
severity: CRITICAL

mitre_attack:
  techniques:
    - T1195.002  # Supply Chain Compromise
    - T1552.001  # Credentials in Files
    - T1528      # Steal Application Access Token
  tactics:
    - Initial Access
    - Credential Access

trigger:
  source: sentinel_alert
  conditions:
    - field: alert.name
      operator: contains
      value: "litellm_supply_chain"
    - field: alert.severity
      operator: in
      value: ["Critical", "High"]
  cooldown: 300  # 5 minutes between executions per host

inputs:
  - name: affected_host
    type: string
    description: "Hostname or IP of compromised system"
    required: true
  - name: affected_user
    type: string
    description: "User account running the compromised Python process"
    required: true
  - name: credential_scope
    type: enum
    values: ["host_only", "service_account", "org_wide"]
    default: "service_account"
    description: "Scope of credential rotation"

steps:
  - id: step-1
    action: verify_alert
    target: sentinel
    description: "Validate the supply chain alert and gather context"
    parameters:
      query: |
        SecurityAlert
        | where AlertName has "litellm"
        | where CompromisedEntity == "{{ inputs.affected_host }}"
        | top 1 by TimeGenerated desc
    timeout: 30s
    on_failure: abort

  - id: step-2
    action: network_contain
    target: crowdstrike
    description: "Isolate the affected host from the network"
    parameters:
      host_identifier: "{{ inputs.affected_host }}"
      containment_level: "full"
      allow_list:
        - "soc-jumpbox.internal"
        - "forensics-server.internal"
    timeout: 60s
    retry: 2
    on_failure: escalate

  - id: step-3
    action: enumerate_credentials
    target: local
    description: "Identify all exposed credentials on the compromised host"
    parameters:
      scan_paths:
        - "/home/{{ inputs.affected_user }}/.env"
        - "/opt/litellm/.env"
        - "/etc/environment"
        - "{{ inputs.affected_user }} environment variables"
      credential_patterns:
        - "AWS_*_KEY"
        - "AZURE_*"
        - "OPENAI_API_KEY"
        - "ANTHROPIC_API_KEY"
        - "LITELLM_*"
        - "DATABASE_URL"
    timeout: 60s

  - id: step-4
    action: rotate_credentials
    target: azure_keyvault
    description: "Rotate all identified cloud credentials"
    parameters:
      vault_name: "{{ env.KEYVAULT_NAME }}"
      credentials: "{{ steps.step-3.output.found_credentials }}"
      rotation_scope: "{{ inputs.credential_scope }}"
      generate_new: true
      store_old_as_backup: true
      backup_expiry: "7d"
    timeout: 120s
    retry: 1
    on_failure: escalate

  - id: step-5
    action: revoke_tokens
    target: azure_ad
    description: "Revoke all OAuth tokens for affected service principals"
    parameters:
      user: "{{ inputs.affected_user }}"
      scope: "all_sessions"
      include_service_principals: true
      apps_filter:
        - "litellm*"
        - "openai*"
        - "anthropic*"
    timeout: 60s

  - id: step-6
    action: block_domains
    target: edge_enforcement
    description: "Push DNS blocks for known C2 domains to all edge nodes"
    parameters:
      domains:
        - "*.litellm-telemetry.io"
        - "*.ai-proxy-cdn.com"
        - "*.ml-analytics-pipe.net"
      action: block
      enforcement_type: dns_sinkhole
      ttl: 86400
    timeout: 30s

  - id: step-7
    action: notify_soc
    target: teams_webhook
    description: "Send enriched alert to SOC team channel"
    parameters:
      channel: "{{ env.SOC_CHANNEL }}"
      template: supply_chain_incident
      data:
        host: "{{ inputs.affected_host }}"
        user: "{{ inputs.affected_user }}"
        credentials_rotated: "{{ steps.step-4.output.rotated_count }}"
        tokens_revoked: "{{ steps.step-5.output.revoked_count }}"
        containment_status: "{{ steps.step-2.output.status }}"
    timeout: 15s

  - id: step-8
    action: create_incident
    target: jira
    description: "Create P1 incident ticket with full context"
    parameters:
      project: "{{ env.JIRA_PROJECT }}"
      type: "Incident"
      priority: "P1"
      title: "SUPPLY CHAIN: LiteLLM compromise on {{ inputs.affected_host }}"
      description: |
        ## Supply Chain Incident — LiteLLM
        **Host:** {{ inputs.affected_host }}
        **User:** {{ inputs.affected_user }}
        **Credentials Rotated:** {{ steps.step-4.output.rotated_count }}
        **Containment:** {{ steps.step-2.output.status }}
        **MITRE ATT&CK:** T1195.002, T1552.001, T1528
      labels: ["supply-chain", "litellm", "p1", "auto-response"]

outputs:
  - name: incident_id
    source: steps.step-8.output.ticket_id
  - name: rotated_credentials
    source: steps.step-4.output.rotated_count
  - name: containment_status
    source: steps.step-2.output.status

rollback:
  description: "Rollback if containment causes service disruption"
  steps:
    - action: lift_containment
      target: crowdstrike
      parameters:
        host_identifier: "{{ inputs.affected_host }}"
    - action: notify_soc
      target: teams_webhook
      parameters:
        message: "Containment rolled back for {{ inputs.affected_host }} — manual investigation required"

governance:
  requires_ai_oversight: true
  brain_model: "claude-3.5-sonnet"
  blast_radius: "service_account"
  max_credential_rotations: 50
  requires_approval_if:
    - credential_scope == "org_wide"
