title: LiteLLM Supply Chain Attack Network Indicators
id: c3d4e5f6-a7b8-9012-cdef-012345678901
status: stable
level: critical
description: |
  Detects outbound network connections from Python processes to known
  C2 domains and exfiltration endpoints associated with the LiteLLM
  supply chain compromise. Includes DNS queries and HTTP connections
  to attacker-controlled infrastructure.
author: SOaC Community
date: 2026/03/28
tags:
  - attack.command_and_control
  - attack.t1071.001
  - attack.exfiltration
  - attack.t1567
logsource:
  category: dns_query
  product: windows
detection:
  selection_domains:
    QueryName|endswith:
      - '.litellm-telemetry.io'
      - '.ai-proxy-cdn.com'
      - '.ml-analytics-pipe.net'
    QueryName|contains:
      - 'litellm-update'
      - 'proxy-health-check'
  selection_process:
    Image|endswith:
      - '\python.exe'
      - '\python3.exe'
      - '/python'
      - '/python3'
  condition: selection_domains or (selection_process and selection_domains)
falsepositives:
  - Legitimate LiteLLM telemetry (verify against official documentation)
fields:
  - QueryName
  - Image
  - User
  - SourceIp
