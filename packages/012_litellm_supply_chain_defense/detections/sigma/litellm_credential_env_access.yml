title: Suspicious Environment Variable Access - Cloud Credentials
id: b2c3d4e5-f6a7-8901-bcde-f01234567890
status: stable
level: high
description: |
  Detects processes reading cloud credential environment variables
  (AWS_SECRET_ACCESS_KEY, AZURE_CLIENT_SECRET, OPENAI_API_KEY, etc.)
  which may indicate credential harvesting by a supply chain implant.
author: SOaC Community
date: 2026/03/28
tags:
  - attack.credential_access
  - attack.t1552.001
  - attack.supply_chain
logsource:
  category: process_creation
  product: windows
detection:
  selection_env_read:
    CommandLine|contains:
      - 'AWS_SECRET_ACCESS_KEY'
      - 'AZURE_CLIENT_SECRET'
      - 'OPENAI_API_KEY'
      - 'ANTHROPIC_API_KEY'
      - 'LITELLM_MASTER_KEY'
      - 'DATABASE_URL'
      - 'HUGGINGFACE_API_KEY'
  selection_processes:
    Image|endswith:
      - '\python.exe'
      - '\python3.exe'
      - '/python'
      - '/python3'
  filter_known_good:
    ParentImage|endswith:
      - '\pip.exe'
      - '\conda.exe'
      - '\pipenv.exe'
  condition: selection_env_read and selection_processes and not filter_known_good
falsepositives:
  - Legitimate application configuration scripts
  - CI/CD pipeline credential injection
fields:
  - CommandLine
  - User
  - ParentImage
  - Image
