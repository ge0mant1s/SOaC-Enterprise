apiVersion: claw.soac.io/v1
kind: Playbook

metadata:
  name: "data-exfiltration-containment"
  version: "1.0.0"
  author: "SOaC Community"
  created: "2026-03-16T00:00:00Z"
  tags: ["pkg-009", "automated-response"]
  mitre_attack: ["T1560", "T1041", "T1567"]
  severity: "CRITICAL"
  package_id: "pkg-009"

spec:
  description: "Block exfiltration channel, quarantine staging host, preserve forensic evidence, and escalate to CISO for data breach assessment."

  trigger:
    source: "BODY"
    conditions:
      - field: "detection_type"
        operator: "eq"
        value: "data_exfiltration"
    cooldown: "5m"

  inputs:
    - name: "detection_event"
      type: "object"
      required: true
      description: "The detection event payload from The Body"
    - name: "target_identity"
      type: "string"
      required: true
      description: "The target user or entity identifier"

  steps:
    - id: "step-1"
      name: "block_exfil_channel"
      action: "containment"
      target: "EDGE"
      parameters:
          action: "block_outbound"
          scope: "destination"
      timeout: "30s"
      retry:
        max_attempts: 2
        backoff: "exponential"
      on_failure: "halt"
    - id: "step-2"
      name: "quarantine_staging_host"
      action: "containment"
      target: "EDGE"
      parameters:
          action: "network_isolate"
          scope: "host"
      timeout: "30s"
      retry:
        max_attempts: 2
        backoff: "exponential"
      on_failure: "rollback"
    - id: "step-3"
      name: "escalate_to_ciso"
      action: "notification"
      target: "INTERNAL"
      parameters:
          channel: "#ciso-escalation"
          severity: "CRITICAL"
      timeout: "30s"
      retry:
        max_attempts: 2
        backoff: "exponential"
      on_failure: "skip"

  outputs:
    - name: "containment_status"
      type: "string"
      description: "Final status of the containment action"
    - name: "affected_entities"
      type: "object"
      description: "List of entities affected by the response"

  rollback:
    steps:
      - id: "rollback-1"
        name: "restore_network_access"
        action: "containment"
        target: "EDGE"
        parameters:
          action: "remove_isolation"

  governance:
    requires_brain_oversight: true
    max_blast_radius: "org"
    audit_level: "verbose"
    human_approval_required: true
