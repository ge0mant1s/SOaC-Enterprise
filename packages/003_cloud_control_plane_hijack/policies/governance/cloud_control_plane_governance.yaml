name: Cloud Control Plane Governance Policy
version: "1.0.0"
description: |
  Governance policy for cloud control plane security including IAM hygiene,
  logging requirements, and guardrails enforcement.
framework_alignment:
  - CIS AWS Foundations Benchmark v2.0
  - Azure Security Benchmark v3
  - NIST 800-53 AC/AU controls

iam_governance:
  principle: least_privilege
  access_key_rotation: 90_days
  unused_credential_cleanup: 45_days
  mfa_enforcement:
    root_accounts: hardware_token_required
    admin_roles: required
    all_console_users: required
  permission_boundaries: required_for_all_roles
  role_assumption_restrictions:
    max_session_duration: 3600
    external_id_required: true
    condition_keys: ["aws:SourceIp", "aws:MultiFactorAuthPresent"]

logging_requirements:
  cloudtrail:
    enabled: all_regions
    multi_region: true
    log_file_validation: true
    s3_bucket_policy: deny_public_access
    kms_encryption: required
  vpc_flow_logs:
    enabled: all_vpcs
    traffic_type: ALL
    retention_days: 365
  guardduty:
    enabled: all_accounts
    auto_enable_new_accounts: true

guardrails:
  service_control_policies:
    - deny_cloudtrail_disable
    - deny_guardduty_disable
    - deny_leave_organization
    - restrict_root_account_usage
  preventive_controls:
    - deny_public_s3_buckets
    - deny_unencrypted_volumes
    - require_imdsv2

metadata:
  package: pkg-003
  mitre_techniques: ["T1098.001", "T1078.004", "T1562.008", "T1550.001", "T1578"]
  last_updated: "2025-03-28"
