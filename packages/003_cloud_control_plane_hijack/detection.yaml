apiVersion: soac.io/v1
kind: DetectionRule

metadata:
  name: "supply-chain-npm-compromise"
  version: "1.0.0"
  author: "SOaC Community"
  created: "2026-03-16T00:00:00Z"
  package_id: "pkg-003"
  mitre_attack:
    - technique: "T1195.002"
      tactic: "Initial Access"
    - technique: "T1059.007"
      tactic: "Execution"
    - technique: "T1027"
      tactic: "Defense Evasion"
  severity: "HIGH"
  confidence: "HIGH"
  tags: ["pkg-003", "initial-access"]

spec:
  description: "Detects malicious npm package installations, dependency confusion attacks, and post-install script execution anomalies."

  data_sources:
    - name: "npm audit logs"
      type: "log"
      fields: ["package_name", "version", "install_scripts", "registry_source"]

  logic:
    type: "signature"
    timewindow: "5m"
    implementations:
      sigma:
        rule: |
          title: Malicious npm Package Post-Install Execution
          status: experimental
          logsource:
            category: process_creation
            product: linux
          detection:
            selection:
              ParentCommandLine|contains: npm install
              CommandLine|contains:
                - curl
                - wget
                - /dev/tcp
            condition: selection
          level: high

  tuning:
    threshold: 1
    whitelist: []
    noise_reduction: "dedup_by_user"

  response:
    playbook: "supply-chain-quarantine"
    escalation: "auto"
    notify: ["soc-team"]

  test_cases:
    - name: "positive-match"
      description: "Simulated initial access event that should trigger alert"
      input:
        event_type: "supply_chain_compromise"
        severity: "HIGH"
      expected_result: "alert"
