name: contain-cloud-control-plane-compromise
version: "1.0.0"
description: |
  Automated containment playbook for cloud control plane hijack incidents.
  Revokes compromised credentials, restores logging, locks down IAM,
  and preserves forensic evidence from CloudTrail.
severity: CRITICAL
mitre_attack:
  tactics: [Privilege Escalation, Defense Evasion, Lateral Movement]
  techniques: [T1098.001, T1078.004, T1562.008, T1550.001]
trigger:
  source: sentinel_alert
  conditions:
    - alert_type: "iam_escalation_chain"
      severity: ["critical", "high"]
    - alert_type: "control_plane_logging_disruption"
      severity: ["critical"]
  cooldown: 300
inputs:
  compromised_identity:
    type: string
    description: "ARN of the compromised IAM identity"
    required: true
  affected_accounts:
    type: list
    description: "List of AWS account IDs affected"
    required: true
  incident_id:
    type: string
    description: "Incident tracking ID"
    required: true
steps:
  - id: revoke_iam_sessions
    action: aws.revoke_sessions
    description: "Immediately revoke all active sessions for compromised identity"
    target: "{{ inputs.compromised_identity }}"
    parameters:
      deactivate_access_keys: true
      revoke_console_sessions: true
      attach_deny_all_policy: true
    timeout: 30
    on_failure: alert

  - id: restore_logging
    action: aws.restore_cloudtrail
    description: "Re-enable any disabled CloudTrail trails and flow logs"
    target: "{{ inputs.affected_accounts }}"
    parameters:
      verify_trail_status: true
      enable_log_validation: true
      restore_flow_logs: true
    timeout: 60
    on_failure: alert

  - id: audit_iam_changes
    action: aws.audit_iam
    description: "Audit all IAM changes made by compromised identity in last 24h"
    target: "{{ inputs.affected_accounts }}"
    parameters:
      identity_arn: "{{ inputs.compromised_identity }}"
      timerange: "24h"
      focus: ["policy_changes", "role_creations", "user_creations", "key_creations"]
    timeout: 120
    on_failure: continue

  - id: rollback_iam_changes
    action: aws.rollback_iam
    description: "Revert unauthorized IAM changes identified in audit"
    target: "{{ steps.audit_iam_changes.outputs.unauthorized_changes }}"
    parameters:
      require_approval: true
      create_backup: true
    timeout: 120
    on_failure: alert

  - id: lock_security_groups
    action: aws.remediate_network
    description: "Remove any 0.0.0.0/0 rules added by attacker"
    target: "{{ steps.audit_iam_changes.outputs.network_changes }}"
    parameters:
      remove_open_rules: true
      restore_previous_state: true
    timeout: 60
    on_failure: alert

  - id: preserve_cloudtrail_evidence
    action: aws.export_logs
    description: "Export CloudTrail logs for forensic analysis and legal hold"
    target: "{{ inputs.affected_accounts }}"
    parameters:
      log_sources: ["cloudtrail", "vpc_flow_logs", "guardduty_findings"]
      timerange: "48h"
      export_format: "json"
      legal_hold: true
    timeout: 300
    on_failure: continue

  - id: notify_cloud_team
    action: notification.send
    description: "Notify cloud security team and management"
    parameters:
      channels: ["cloud_security", "soc_critical", "ciso_direct"]
      template: "cloud_compromise"
      data:
        incident_id: "{{ inputs.incident_id }}"
        compromised_identity: "{{ inputs.compromised_identity }}"
        affected_accounts: "{{ inputs.affected_accounts }}"
        iam_audit: "{{ steps.audit_iam_changes.outputs }}"
    timeout: 10
    on_failure: log

outputs:
  containment_status:
    value: "{{ steps.revoke_iam_sessions.status }}"
  logging_restored:
    value: "{{ steps.restore_logging.status }}"
  iam_audit_results:
    value: "{{ steps.audit_iam_changes.outputs }}"
  evidence_archive:
    value: "{{ steps.preserve_cloudtrail_evidence.outputs }}"

rollback:
  steps:
    - action: aws.detach_deny_policy
      target: "{{ inputs.compromised_identity }}"
    - action: aws.reactivate_access_keys
      target: "{{ inputs.compromised_identity }}"

governance:
  requires_ai_oversight: true
  blast_radius: multi_account
  approval_required_for:
    - iam_rollback
    - access_key_reactivation
