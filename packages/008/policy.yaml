apiVersion: soac.io/v1
kind: Policy

metadata:
  name: "lateral-movement-lab-policy"
  version: "1.0.0"
  author: "SOaC Community"
  created: "2026-03-16T00:00:00Z"
  package_id: "pkg-008"
  scope: "package"
  tags: ["pkg-008", "lab-safety"]

spec:
  description: "Governs lab execution constraints for lateral movement scenarios with isolated network segments."

  environments:
    - name: "lab"
      mode: "simulate"
      data_handling: "synthetic"
      network_access: "isolated"
      persistence: "ephemeral"
    - name: "staging"
      mode: "audit"
      data_handling: "anonymized"
      network_access: "restricted"
      persistence: "persistent"
    - name: "production"
      mode: "enforce"
      data_handling: "live"
      network_access: "full"
      persistence: "persistent"

  actions:
    allowed: ["detect", "alert", "enrich", "contain", "notify", "audit"]
    blocked: ["delete_data", "exfiltrate", "disable_logging"]
    requires_approval: ["contain", "isolate_host"]

  access_control:
    roles:
      - name: "soc_analyst"
        permissions: ["read", "execute"]
      - name: "detection_engineer"
        permissions: ["read", "write", "execute"]
      - name: "admin"
        permissions: ["read", "write", "execute", "admin"]
    authentication:
      required: true
      methods: ["sso", "mfa"]

  compliance:
    frameworks: ["NIST CSF", "MITRE ATT&CK", "ISO 27001"]
    controls: ["DE.CM-1", "RS.RP-1", "PR.AC-1"]
    review_frequency: "quarterly"

  audit:
    log_level: "verbose"
    retention: "90d"
    immutable: true
