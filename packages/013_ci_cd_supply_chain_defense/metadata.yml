apiVersion: soac.io/v1
kind: PackageMetadata

package:
  id: "pkg-013"
  name: "CI/CD Supply Chain Defense"
  version: "1.0.0"
  description: "Detect and contain CI/CD pipeline supply chain attacks including forced tag mutations, build runner secret harvesting, artifact tampering, and unauthorized container image publication."
  author: "SOaC Community"
  created: "2026-03-30T00:00:00Z"
  updated: "2026-03-30T00:00:00Z"
  status: "released"
  license: "MIT"

threat:
  mitre_attack:
    - technique_id: "T1195.002"
      technique_name: "Compromise Software Supply Chain"
      tactic: "Initial Access"
    - technique_id: "T1059.004"
      technique_name: "Unix Shell"
      tactic: "Execution"
    - technique_id: "T1552.001"
      technique_name: "Credentials In Files"
      tactic: "Credential Access"
    - technique_id: "T1496"
      technique_name: "Resource Hijacking"
      tactic: "Impact"
    - technique_id: "T1588.001"
      technique_name: "Obtain Capabilities: Malware"
      tactic: "Resource Development"
    - technique_id: "T1105"
      technique_name: "Ingress Tool Transfer"
      tactic: "Command and Control"
    - technique_id: "T1071.001"
      technique_name: "Web Protocols"
      tactic: "Command and Control"
  threat_actors: []
  severity: "CRITICAL"

artifacts:
