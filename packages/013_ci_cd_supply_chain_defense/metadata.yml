      name: "ci-cd-supply-chain-containment"
      severity: "CRITICAL"
  policies:
    - path: "policy.yaml"
      name: "ci-cd-pipeline-security-policy"
      scope: "package"
  simulations:
    - scenario_id: "pkg-013"
      name: "CI/CD Supply Chain Attack Lab Scenario"

