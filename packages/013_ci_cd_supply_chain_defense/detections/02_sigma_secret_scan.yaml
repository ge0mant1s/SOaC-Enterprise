title: CI Runner Secret Harvest Pattern
id: 013-SIG-002
status: stable
platform: sigma
logsource:
  product: linux
  category: process_creation
detection:
  selection:
    CommandLine|contains:
      - '/.ssh/id_rsa'
      - '/.aws/credentials'
      - '/.azure/accessTokens.json'
      - 'KUBECONFIG'
  condition: selection
falsepositives:
  - Legitimate backup or migration script
level: critical
mitre: [T1552.001, T1552.004]
