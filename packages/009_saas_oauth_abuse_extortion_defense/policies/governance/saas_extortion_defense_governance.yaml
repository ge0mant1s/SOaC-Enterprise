name: SaaS Data Extortion Defense Governance — GTR-2025
version: "1.0.0"
description: Governance policy for SaaS data extortion prevention and response.
framework_alignment: [CrowdStrike GTR-2025, NIST 800-53 SC/SI, GDPR Art. 33-34]
data_protection:
  sensitivity_labeling: required
  dlp_policies: enforced
  external_sharing: approval_required
  anonymous_links: disabled_by_default
extortion_response:
  legal_counsel_engagement: within_4h
  regulatory_notification: per_jurisdiction
  ransom_decision: board_level_approval
  law_enforcement: mandatory_engagement
monitoring:
  bulk_data_access: real_time_alerting
  sharing_policy_changes: immediate_notification
  oauth_scope_changes: admin_approval_required
metadata:
  package: pkg-009
  mitre_techniques: [T1567.002, T1098.003, T1657, T1213]
  last_updated: "2025-03-28"
