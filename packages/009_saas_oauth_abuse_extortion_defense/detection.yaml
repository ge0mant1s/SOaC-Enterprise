apiVersion: soac.io/v1
kind: DetectionRule

metadata:
  name: "data-exfiltration-staging-detection"
  version: "1.0.0"
  author: "SOaC Community"
  created: "2026-03-16T00:00:00Z"
  package_id: "pkg-009"
  mitre_attack:
    - technique: "T1560"
      tactic: "Collection"
    - technique: "T1041"
      tactic: "Exfiltration"
    - technique: "T1567"
      tactic: "Exfiltration"
  severity: "CRITICAL"
  confidence: "HIGH"
  tags: ["pkg-009", "collection"]

spec:
  description: "Detects data staging and exfiltration patterns including archive creation, large outbound transfers, and uploads to unauthorized cloud storage services."

  data_sources:
    - name: "DLP logs"
      type: "log"
      fields: ["source_host", "destination", "bytes_transferred", "file_type", "sensitivity_label"]

  logic:
    type: "threshold"
    timewindow: "5m"
    implementations:
      sigma:
        rule: |
          title: Data Exfiltration via Large Outbound Transfer
          status: experimental
          logsource:
            category: network_connection
          detection:
            selection:
              dst_port:
                - 443
                - 80
            filter:
              bytes_sent|gt: 104857600
            condition: selection and filter
          level: critical

  tuning:
    threshold: 1
    whitelist: []
    noise_reduction: "dedup_by_user"

  response:
    playbook: "data-exfiltration-containment"
    escalation: "auto"
    notify: ["soc-team"]

  test_cases:
    - name: "positive-match"
      description: "Simulated collection event that should trigger alert"
      input:
        event_type: "data_exfiltration"
        severity: "CRITICAL"
      expected_result: "alert"
