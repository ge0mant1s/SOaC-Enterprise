apiVersion: claw.soac.io/v1
kind: Playbook

metadata:
  name: "supply-chain-quarantine"
  version: "1.0.0"
  author: "SOaC Community"
  created: "2026-03-16T00:00:00Z"
  tags: ["pkg-003", "automated-response"]
  mitre_attack: ["T1195.002", "T1059.007", "T1027"]
  severity: "HIGH"
  package_id: "pkg-003"

spec:
  description: "Quarantine compromised build artifacts, revoke affected package versions, and notify development teams."

  trigger:
    source: "BODY"
    conditions:
      - field: "detection_type"
        operator: "eq"
        value: "supply_chain_compromise"
    cooldown: "5m"

  inputs:
    - name: "detection_event"
      type: "object"
      required: true
      description: "The detection event payload from The Body"
    - name: "target_identity"
      type: "string"
      required: true
      description: "The target user or entity identifier"

  steps:
    - id: "step-1"
      name: "quarantine_artifact"
      action: "containment"
      target: "EDGE"
      parameters:
          action: "quarantine_build"
          scope: "pipeline"
      timeout: "30s"
      retry:
        max_attempts: 2
        backoff: "exponential"
      on_failure: "halt"
    - id: "step-2"
      name: "revoke_package"
      action: "api_call"
      target: "INTERNAL"
      parameters:
          action: "unpublish_version"
          registry: "npm"
      timeout: "30s"
      retry:
        max_attempts: 2
        backoff: "exponential"
      on_failure: "skip"
    - id: "step-3"
      name: "notify_dev_team"
      action: "notification"
      target: "INTERNAL"
      parameters:
          channel: "#dev-security"
          severity: "HIGH"
      timeout: "30s"
      retry:
        max_attempts: 2
        backoff: "exponential"
      on_failure: "skip"

  outputs:
    - name: "containment_status"
      type: "string"
      description: "Final status of the containment action"
    - name: "affected_entities"
      type: "object"
      description: "List of entities affected by the response"

  rollback:
    steps:
      - id: "rollback-1"
        name: "restore_artifact"
        action: "api_call"
        target: "INTERNAL"
        parameters:
          action: "restore_build_artifact"

  governance:
    requires_brain_oversight: false
    max_blast_radius: "org"
    audit_level: "verbose"
    human_approval_required: false
