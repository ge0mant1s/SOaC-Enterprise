apiVersion: claw.soac.io/v1
kind: Playbook
metadata:
  name: uac-8837-ad-recon-identity-pivot-reverse-tunnel-defense
  version: "1.0.0"
  author: "SOaC CLAW Engineering Team"
  created: "2024-01-15T10:30:00Z"
  tags:
    - "active-directory"
    - "lateral-movement"
    - "tunneling"
    - "credential-harvesting"
    - "persistence"
    - "uac-8837"
  mitre_attack:
    - "T1190"
    - "T1078"
    - "T1082"
    - "T1033"
    - "T1049"
    - "T1112"
    - "T1021.001"
    - "T1105"
    - "T1027"
    - "T1090"
    - "T1572"
    - "T1087.002"
    - "T1069.002"
    - "T1018"
    - "T1134"
    - "T1558"
    - "T1550"
    - "T1136.002"
    - "T1098"
    - "T1560"
    - "T1556"
    - "T1005"
  severity: "critical"
  package_id: "pkg-016"
spec:
  description: "Automated response playbook for UAT-8837 threat actor conducting AD reconnaissance, identity pivoting, and reverse tunnel establishment. Addresses multi-phase attack chain from initial access through persistence."
  trigger:
    type: "alert"
    conditions:
      - "threat_actor == 'UAT-8837'"
      - "mitre_techniques intersects ['T1087.002', 'T1090', 'T1572', 'T1136.002']"
      - "target_stacks intersects ['SaaS', 'Endpoint', 'Network', 'Entra']"
  inputs:
    - name: "alert_id"
      type: "string"
      required: true
      description: "Unique identifier for the triggering alert"
    - name: "affected_hosts"
      type: "array"
      required: true
      description: "List of compromised or suspicious endpoints"
    - name: "suspicious_accounts"
      type: "array"
      required: false
      description: "User accounts showing signs of compromise"
    - name: "network_indicators"
      type: "object"
      required: false
      description: "Network IOCs including tunnel endpoints and C2 infrastructure"
  steps:
    - name: "isolate_compromised_endpoints"
      action: "endpoint.isolate"
      target: "{{ inputs.affected_hosts }}"
      parameters:
        isolation_type: "network"
        preserve_management: true
        notification_message: "Endpoint isolated due to UAT-8837 activity detection"
      timeout: 300
      retry: 2
      on_failure: "continue"
    - name: "disable_suspicious_accounts"
      action: "identity.disable_accounts"
      target: "entra_id"
      parameters:
        accounts: "{{ inputs.suspicious_accounts }}"
        disable_type: "temporary"
        reason: "Suspected compromise by UAT-8837"
        force_signout: true
      timeout: 180
      retry: 3
      on_failure: "escalate"
    - name: "block_tunnel_infrastructure"
      action: "network.block_indicators"
      target: "firewall"
      parameters:
        indicators: "{{ inputs.network_indicators.tunnel_endpoints }}"
        block_type: "bidirectional"
        rule_priority: "high"
        duration: "24h"
      timeout: 120
      retry: 2
      on_failure: "continue"
    - name: "hunt_ad_reconnaissance_artifacts"
      action: "threat_hunting.execute_query"
      target: "siem"
      parameters:
        query_template: "uac_8837_ad_recon"
        timeframe: "last_4_hours"
        focus_techniques: ["T1087.002", "T1069.002", "T1018"]
        output_format: "structured"
      timeout: 600
      retry: 1
      on_failure: "continue"
    - name: "reset_rdp_configurations"
      action: "endpoint.remediate_registry"
      target: "{{ inputs.affected_hosts }}"
      parameters:
        registry_keys:
          - "HKLM\\System\\CurrentControlSet\\Control\\Terminal Server"
          - "HKLM\\System\\CurrentControlSet\\Control\\Terminal Server\\WinStations\\RDP-Tcp"
        action_type: "restore_baseline"
        backup_before_change: true
      timeout: 300
      retry: 2
      on_failure: "continue"
    - name: "revoke_kerberos_tickets"
      action: "identity.revoke_tickets"
      target: "domain_controller"
      parameters:
        accounts: "{{ inputs.suspicious_accounts }}"
        ticket_types: ["tgt", "service_tickets"]
        force_reauth: true
      timeout: 240
      retry: 3
      on_failure: "escalate"
    - name: "deploy_enhanced_monitoring"
      action: "monitoring.deploy_sensors"
      target: "{{ inputs.affected_hosts }}"
      parameters:
        sensor_types: ["process_monitoring", "network_monitoring", "file_integrity"]
        monitoring_duration: "72h"
        alert_threshold: "low"
        focus_behaviors: ["credential_access", "lateral_movement", "tunneling"]
      timeout: 180
      retry: 2
      on_failure: "continue"
    - name: "generate_incident_report"
      action: "reporting.create_incident"
      target: "soar_platform"
      parameters:
        incident_type: "advanced_persistent_threat"
        threat_actor: "UAT-8837"
        affected_assets: "{{ inputs.affected_hosts + inputs.suspicious_accounts }}"
        attack_phases: ["initial_access", "discovery", "lateral_movement", "persistence"]
        recommendations: "immediate_containment"
      timeout: 120
      retry: 1
      on_failure: "continue"
  outputs:
    - name: "containment_status"
      type: "object"
      description: "Status of endpoint isolation and account disabling actions"
    - name: "hunting_results"
      type: "array"
      description: "Additional IOCs and artifacts discovered during threat hunting"
    - name: "remediation_summary"
      type: "object"
      description: "Summary of all remediation actions taken and their success status"
    - name: "incident_id"
      type: "string"
      description: "Generated incident identifier for tracking and follow-up"
  rollback:
    enabled: true
    steps:
      - name: "restore_endpoint_connectivity"
        action: "endpoint.unisolate"
        target: "{{ inputs.affected_hosts }}"
        condition: "false_positive_confirmed"
      - name: "re_enable_accounts"
        action: "identity.enable_accounts"
        target: "entra_id"
        condition: "account_validation_passed"
      - name: "remove_network_blocks"
        action: "network.unblock_indicators"
        target: "firewall"
        condition: "infrastructure_validated_clean"