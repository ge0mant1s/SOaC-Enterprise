title: SOAC-DET-006-001 Prompt Injection Indicators
id: soac-det-006-001
status: experimental
description: Detects common prompt-injection patterns in LLM prompts and retrieved content.
author: OpenCLAW
logsource:
  product: llm_gateway
  service: prompt_logs

detection:
  selection:
    prompt|contains:
      - "ignore previous instructions"
      - "system prompt"
      - "developer message"
      - "reveal"
      - "exfiltrate"
      - "tool"
      - "override"
  condition: selection
level: medium
tags:
  - attack.prompt_injection
