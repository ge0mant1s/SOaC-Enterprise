apiVersion: soac.io/v1
kind: DetectionRule

metadata:
  name: "cloud-iam-privesc-detection"
  version: "1.0.0"
  author: "SOaC Community"
  created: "2026-03-16T00:00:00Z"
  package_id: "pkg-007"
  mitre_attack:
    - technique: "T1078.004"
      tactic: "Defense Evasion"
    - technique: "T1548"
      tactic: "Privilege Escalation"
    - technique: "T1484"
      tactic: "Defense Evasion"
  severity: "CRITICAL"
  confidence: "HIGH"
  tags: ["pkg-007", "defense-evasion"]

spec:
  description: "Detects IAM privilege escalation patterns including role chaining, policy attachment anomalies, and cross-account AssumeRole abuse in cloud environments."

  data_sources:
    - name: "AWS CloudTrail"
      type: "cloud"
      fields: ["eventName", "userIdentity.arn", "requestParameters.roleName", "sourceIPAddress"]

  logic:
    type: "correlation"
    timewindow: "5m"
    implementations:
      sigma:
        rule: |
          title: Cloud IAM Privilege Escalation via Role Chaining
          status: experimental
          logsource:
            product: aws
            service: cloudtrail
          detection:
            selection:
              eventName:
                - AssumeRole
                - AttachRolePolicy
                - PutRolePolicy
            condition: selection | count(eventName) by userIdentity.arn > 5
          level: critical

  tuning:
    threshold: 1
    whitelist: []
    noise_reduction: "dedup_by_user"

  response:
    playbook: "cloud-iam-privesc-containment"
    escalation: "auto"
    notify: ["soc-team"]

  test_cases:
    - name: "positive-match"
      description: "Simulated defense evasion event that should trigger alert"
      input:
        event_type: "cloud_iam_privesc"
        severity: "CRITICAL"
      expected_result: "alert"
