apiVersion: claw.soac.io/v1
kind: Playbook

metadata:
  name: "cloud-iam-privesc-containment"
  version: "1.0.0"
  author: "SOaC Community"
  created: "2026-03-16T00:00:00Z"
  tags: ["pkg-007", "automated-response"]
  mitre_attack: ["T1078.004", "T1548", "T1484"]
  severity: "CRITICAL"
  package_id: "pkg-007"

spec:
  description: "Revoke escalated IAM sessions, detach unauthorized policies, quarantine compromised role, and audit cross-account trust."

  trigger:
    source: "BODY"
    conditions:
      - field: "detection_type"
        operator: "eq"
        value: "cloud_iam_privesc"
    cooldown: "5m"

  inputs:
    - name: "detection_event"
      type: "object"
      required: true
      description: "The detection event payload from The Body"
    - name: "target_identity"
      type: "string"
      required: true
      description: "The target user or entity identifier"

  steps:
    - id: "step-1"
      name: "revoke_iam_sessions"
      action: "containment"
      target: "EDGE"
      parameters:
          action: "revoke_iam_sessions"
          scope: "role"
      timeout: "30s"
      retry:
        max_attempts: 2
        backoff: "exponential"
      on_failure: "halt"
    - id: "step-2"
      name: "detach_unauthorized_policies"
      action: "api_call"
      target: "BODY"
      parameters:
          action: "detach_iam_policy"
          scope: "suspicious"
      timeout: "30s"
      retry:
        max_attempts: 2
        backoff: "exponential"
      on_failure: "rollback"
    - id: "step-3"
      name: "audit_cross_account_trust"
      action: "api_call"
      target: "INTERNAL"
      parameters:
          action: "enumerate_trust_policies"
      timeout: "30s"
      retry:
        max_attempts: 2
        backoff: "exponential"
      on_failure: "skip"

  outputs:
    - name: "containment_status"
      type: "string"
      description: "Final status of the containment action"
    - name: "affected_entities"
      type: "object"
      description: "List of entities affected by the response"

  rollback:
    steps:
      - id: "rollback-1"
        name: "restore_iam_policy"
        action: "api_call"
        target: "BODY"
        parameters:
          action: "reattach_original_policy"

  governance:
    requires_brain_oversight: true
    max_blast_radius: "org"
    audit_level: "verbose"
    human_approval_required: true
