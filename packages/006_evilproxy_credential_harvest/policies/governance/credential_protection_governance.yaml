name: Credential Protection & Anti-Phishing Governance
version: "1.0.0"
description: Governance policy for credential protection against AitM phishing and MFA bypass.
framework_alignment: [NIST 800-63B, CISA Phishing Guidance]
authentication_requirements:
  mfa_method: phishing_resistant_required
  acceptable_methods: [fido2_security_key, windows_hello, certificate_based]
  deprecated_methods: [sms, voice_call, push_notification]
  password_policy: {min_length: 14, complexity: true, breach_detection: true}
token_protection:
  continuous_access_evaluation: enabled
  token_binding: recommended
  session_lifetime: {access_token: 1h, refresh_token: 24h}
anti_phishing:
  safe_links: enabled
  safe_attachments: enabled
  anti_spoofing: strict
  user_training: quarterly
  phishing_simulations: monthly
metadata:
  package: pkg-006
  mitre_techniques: ["T1557.001", "T1539", "T1621", "T1566.002"]
  last_updated: "2025-03-28"
