name: contain-credential-harvest-and-ato
version: "1.0.0"
description: |
  Automated containment for EvilProxy credential harvest and subsequent
  account takeover. Revokes sessions, forces password reset, removes
  malicious inbox rules, and locks down affected accounts.
severity: CRITICAL
mitre_attack:
  tactics: [Credential Access, Initial Access, Collection]
  techniques: [T1557.001, T1539, T1621, T1114.003]
trigger:
  source: sentinel_alert
  conditions:
    - alert_type: "evilproxy_aitm_detection"
      severity: ["critical"]
    - alert_type: "mfa_fatigue_detection"
      severity: ["critical"]
  cooldown: 300
inputs:
  compromised_users:
    type: list
    required: true
  incident_id:
    type: string
    required: true
steps:
  - id: revoke_all_sessions
    action: azure_ad.revoke_sessions
    target: "{{ inputs.compromised_users }}"
    parameters:
      revoke_refresh_tokens: true
      invalidate_cookies: true
      force_sign_out: true
    timeout: 30
    on_failure: alert

  - id: force_password_reset
    action: azure_ad.reset_password
    target: "{{ inputs.compromised_users }}"
    parameters:
      require_change_on_next_login: true
      method: temporary_password
    timeout: 30
    on_failure: alert

  - id: remove_malicious_rules
    action: exchange.remove_inbox_rules
    target: "{{ inputs.compromised_users }}"
    parameters:
      remove_suspicious_rules: true
      criteria: ["forwarding", "delete", "move_to_junk", "created_after_compromise"]
    timeout: 60
    on_failure: continue

  - id: audit_post_compromise
    action: m365.audit_activity
    target: "{{ inputs.compromised_users }}"
    parameters:
      timerange: "24h"
      focus: ["emails_sent", "files_shared", "rules_created", "apps_consented"]
    timeout: 120
    on_failure: continue

  - id: enable_phishing_resistant_mfa
    action: azure_ad.update_mfa
    target: "{{ inputs.compromised_users }}"
    parameters:
      require_fido2_or_windows_hello: true
      disable_push_notifications: true
      disable_sms_voice: true
    timeout: 30
    on_failure: log

  - id: notify_users_and_soc
    action: notification.send
    parameters:
      channels: ["soc_critical", "affected_users", "ciso_direct"]
      template: "credential_harvest_containment"
    timeout: 10
    on_failure: log

outputs:
  sessions_revoked: { value: "{{ steps.revoke_all_sessions.status }}" }
  rules_removed: { value: "{{ steps.remove_malicious_rules.outputs }}" }
  post_compromise_audit: { value: "{{ steps.audit_post_compromise.outputs }}" }

governance:
  requires_ai_oversight: true
  blast_radius: user_accounts
