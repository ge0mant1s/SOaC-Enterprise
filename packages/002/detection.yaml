apiVersion: soac.io/v1
kind: DetectionRule

metadata:
  name: "ransomware-encryption-detection"
  version: "1.0.0"
  author: "SOaC Community"
  created: "2026-03-16T00:00:00Z"
  package_id: "pkg-002"
  mitre_attack:
    - technique: "T1486"
      tactic: "Impact"
    - technique: "T1059"
      tactic: "Execution"
    - technique: "T1068"
      tactic: "Privilege Escalation"
    - technique: "T1490"
      tactic: "Impact"
  severity: "CRITICAL"
  confidence: "HIGH"
  tags: ["pkg-002", "impact"]

spec:
  description: "Detects rapid file encryption patterns, shadow copy deletion, and ransom note creation indicative of ransomware execution."

  data_sources:
    - name: "CrowdStrike Falcon"
      type: "endpoint"
      fields: ["ProcessName", "CommandLine", "FileOperations", "ParentProcessId"]

  logic:
    type: "threshold"
    timewindow: "5m"
    implementations:
      sigma:
        rule: |
          title: Ransomware Encryption Activity
          status: experimental
          logsource:
            category: file_event
            product: windows
          detection:
            selection:
              TargetFilename|endswith:
                - .encrypted
                - .locked
                - .crypt
            condition: selection | count() > 50
          level: critical

  tuning:
    threshold: 1
    whitelist: []
    noise_reduction: "dedup_by_user"

  response:
    playbook: "ransomware-containment-response"
    escalation: "auto"
    notify: ["soc-team"]

  test_cases:
    - name: "positive-match"
      description: "Simulated impact event that should trigger alert"
      input:
        event_type: "ransomware_encryption"
        severity: "CRITICAL"
      expected_result: "alert"
