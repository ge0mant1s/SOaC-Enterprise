apiVersion: soac.io/v1
kind: DetectionRule

metadata:
  name: "credential-harvest-phishing-kit"
  version: "1.0.0"
  author: "SOaC Community"
  created: "2026-03-16T00:00:00Z"
  package_id: "pkg-006"
  mitre_attack:
    - technique: "T1598"
      tactic: "Reconnaissance"
    - technique: "T1566.002"
      tactic: "Initial Access"
    - technique: "T1056.004"
      tactic: "Collection"
  severity: "HIGH"
  confidence: "HIGH"
  tags: ["pkg-006", "reconnaissance"]

spec:
  description: "Detects credential harvesting phishing kits by correlating email link click-through with newly registered lookalike domains and form submission telemetry."

  data_sources:
    - name: "Email gateway logs"
      type: "log"
      fields: ["sender", "recipient", "url_clicked", "domain_age", "subject"]

  logic:
    type: "correlation"
    timewindow: "5m"
    implementations:
      sigma:
        rule: |
          title: Credential Harvesting Phishing Kit Detection
          status: experimental
          logsource:
            category: email
            product: exchange
          detection:
            selection:
              url_clicked|re: https?://[a-z0-9-]+\.(top|xyz|click|info)/
            filter:
              domain_age|lt: 30
            condition: selection and filter
          level: high

  tuning:
    threshold: 1
    whitelist: []
    noise_reduction: "dedup_by_user"

  response:
    playbook: "credential-harvest-response"
    escalation: "auto"
    notify: ["soc-team"]

  test_cases:
    - name: "positive-match"
      description: "Simulated reconnaissance event that should trigger alert"
      input:
        event_type: "credential_harvest_phishing"
        severity: "HIGH"
      expected_result: "alert"
