apiVersion: soac.io/v1
kind: DetectionRule

metadata:
  name: "lolbins-abuse-detection"
  version: "1.0.0"
  author: "SOaC Community"
  created: "2026-03-16T00:00:00Z"
  package_id: "pkg-010"
  mitre_attack:
    - technique: "T1218"
      tactic: "Defense Evasion"
    - technique: "T1059.001"
      tactic: "Execution"
    - technique: "T1036"
      tactic: "Defense Evasion"
  severity: "MEDIUM"
  confidence: "HIGH"
  tags: ["pkg-010", "defense-evasion"]

spec:
  description: "Detects abuse of legitimate Windows system binaries (LOLBins) including mshta, certutil, rundll32, and regsvr32 for malicious execution."

  data_sources:
    - name: "Sysmon"
      type: "endpoint"
      fields: ["ProcessId", "Image", "CommandLine", "ParentImage", "ParentCommandLine"]

  logic:
    type: "signature"
    timewindow: "5m"
    implementations:
      sigma:
        rule: |
          title: LOLBin Abuse - Suspicious System Binary Execution
          status: experimental
          logsource:
            category: process_creation
            product: windows
          detection:
            selection:
              Image|endswith:
                - \mshta.exe
                - \certutil.exe
                - \rundll32.exe
                - \regsvr32.exe
              CommandLine|contains:
                - http
                - /s /n /u
                - -decode
            condition: selection
          level: medium

  tuning:
    threshold: 1
    whitelist: []
    noise_reduction: "dedup_by_user"

  response:
    playbook: "lolbins-containment-response"
    escalation: "auto"
    notify: ["soc-team"]

  test_cases:
    - name: "positive-match"
      description: "Simulated defense evasion event that should trigger alert"
      input:
        event_type: "lolbin_abuse"
        severity: "MEDIUM"
      expected_result: "alert"
