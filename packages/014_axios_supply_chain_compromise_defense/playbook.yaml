apiVersion: claw.soac.io/v1
kind: Playbook
metadata:
  name: supply-chain-package-compromise-response
  version: "1.2.0"
  author: "SOaC CLAW Security Team"
  created: "2024-01-15T10:30:00Z"
  tags: ["supply-chain", "npm", "package-compromise", "c2", "rat", "dprk", "ci-cd"]
  mitre_attack: ["T1195.002", "T1204.005", "T1027", "T1071.001", "T1105", "T1036.005", "T1547.001", "T1219", "T1070.004"]
  severity: "critical"
  package_id: "pkg-014"

spec:
  description: "Automated response playbook for supply chain package compromise incidents involving malicious npm packages, C2 communication, and cross-platform RAT deployment attributed to DPRK threat actors"
  
  trigger:
    source: "siem"
    conditions:
      - "event.type == 'supply_chain_compromise'"
      - "event.package_manager == 'npm'"
      - "event.severity >= 'high'"
      - "indicators.c2_communication == true"
    cooldown: 300

  inputs:
    - name: "compromised_package"
      type: "string"
      required: true
      description: "Name of the compromised npm package"
    - name: "affected_systems"
      type: "array"
      required: true
      description: "List of systems with the malicious package installed"
    - name: "c2_domains"
      type: "array"
      required: false
      description: "Identified command and control domains"
    - name: "incident_id"
      type: "string"
      required: true
      description: "Unique incident identifier"

  steps:
    - name: "immediate_containment"
      action: "isolate_systems"
      target: "network_security"
      parameters:
        systems: "{{ inputs.affected_systems }}"
        isolation_type: "network_quarantine"
        preserve_evidence: true
      timeout: 120
      retry: 2
      on_failure: "continue"

    - name: "block_malicious_package"
      action: "package_registry_block"
      target: "npm_registry"
      parameters:
        package_name: "{{ inputs.compromised_package }}"
        action: "immediate_takedown"
        notify_users: true
      timeout: 60
      retry: 3
      on_failure: "escalate"

    - name: "c2_domain_blocking"
      action: "dns_firewall_block"
      target: "network_security"
      parameters:
        domains: "{{ inputs.c2_domains }}"
        block_type: "sinkhole"
        log_attempts: true
      timeout: 90
      retry: 2
      on_failure: "continue"

    - name: "forensic_evidence_collection"
      action: "collect_artifacts"
      target: "endpoint_security"
      parameters:
        systems: "{{ inputs.affected_systems }}"
        artifacts: ["process_memory", "network_connections", "file_system", "registry_changes"]
        preserve_chain_of_custody: true
      timeout: 300
      retry: 1
      on_failure: "continue"

    - name: "malware_analysis"
      action: "dynamic_analysis"
      target: "sandbox_environment"
      parameters:
        package_source: "{{ inputs.compromised_package }}"
        analysis_depth: "comprehensive"
        platforms: ["windows", "linux", "macos"]
      timeout: 600
      retry: 1
      on_failure: "continue"

    - name: "persistence_removal"
      action: "eradicate_persistence"
      target: "endpoint_security"
      parameters:
        systems: "{{ inputs.affected_systems }}"
        persistence_types: ["startup_items", "scheduled_tasks", "services", "registry_keys"]
        verification_required: true
      timeout: 240
      retry: 2
      on_failure: "manual_intervention"

    - name: "ci_cd_pipeline_scan"
      action: "pipeline_security_scan"
      target: "ci_cd_security"
      parameters:
        scan_type: "dependency_audit"
        remediation_mode: "automatic"
        block_vulnerable_builds: true
      timeout: 180
      retry: 1
      on_failure: "continue"

    - name: "threat_intelligence_sharing"
      action: "share_indicators"
      target: "threat_intelligence"
      parameters:
        iocs: "{{ steps.malware_analysis.outputs.indicators }}"
        attribution: "DPRK"
        sharing_groups: ["industry_partners", "government_agencies"]
        tlp_marking: "amber"
      timeout: 120
      retry: 2
      on_failure: "continue"

  outputs:
    - name: "containment_status"
      value: "{{ steps.immediate_containment.status }}"
    - name: "affected_system_count"
      value: "{{ inputs.affected_systems | length }}"
    - name: "malware_family"
      value: "{{ steps.malware_analysis.outputs.family }}"
    - name: "iocs_extracted"
      value: "{{ steps.malware_analysis.outputs.indicators }}"
    - name: "remediation_complete"
      value: "{{ steps.persistence_removal.status == 'success' }}"

  rollback:
    steps:
      - name: "restore_network_access"
        action: "remove_isolation"
        target: "network_security"
        parameters:
          systems: "{{ inputs.affected_systems }}"
          verification_required: true
      - name: "restore_ci_cd_pipeline"
        action: "enable_pipeline"
        target: "ci_cd_security"
        parameters:
          restore_previous_state: true