apiVersion: soac.io/v1
kind: DetectionRule

metadata:
  name: "byovd-kernel-exploit-detection"
  version: "1.0.0"
  author: "SOaC Community"
  created: "2026-03-16T00:00:00Z"
  package_id: "pkg-004"
  mitre_attack:
    - technique: "T1068"
      tactic: "Privilege Escalation"
    - technique: "T1014"
      tactic: "Defense Evasion"
    - technique: "T1547.006"
      tactic: "Persistence"
  severity: "CRITICAL"
  confidence: "HIGH"
  tags: ["pkg-004", "privilege-escalation"]

spec:
  description: "Detects loading of known vulnerable drivers, kernel callback tampering, and EDR unhooking patterns."

  data_sources:
    - name: "Sysmon"
      type: "endpoint"
      fields: ["EventID", "ImageLoaded", "Hashes", "SignatureStatus"]

  logic:
    type: "signature"
    timewindow: "5m"
    implementations:
      sigma:
        rule: |
          title: BYOVD Vulnerable Driver Load
          status: experimental
          logsource:
            category: driver_load
            product: windows
          detection:
            selection:
              Hashes|contains:
                - SHA256=known_vuln_driver_hash_1
                - SHA256=known_vuln_driver_hash_2
            condition: selection
          level: critical

  tuning:
    threshold: 1
    whitelist: []
    noise_reduction: "dedup_by_user"

  response:
    playbook: "byovd-containment-response"
    escalation: "auto"
    notify: ["soc-team"]

  test_cases:
    - name: "positive-match"
      description: "Simulated privilege escalation event that should trigger alert"
      input:
        event_type: "byovd_driver_load"
        severity: "CRITICAL"
      expected_result: "alert"
