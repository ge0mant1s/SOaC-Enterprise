apiVersion: claw.soac.io/v1
kind: Playbook

metadata:
  name: "byovd-containment-response"
  version: "1.0.0"
  author: "SOaC Community"
  created: "2026-03-16T00:00:00Z"
  tags: ["pkg-004", "automated-response"]
  mitre_attack: ["T1068", "T1014", "T1547.006"]
  severity: "CRITICAL"
  package_id: "pkg-004"

spec:
  description: "Block vulnerable driver loading, restore EDR hooks, isolate host if kernel compromise confirmed."

  trigger:
    source: "BODY"
    conditions:
      - field: "detection_type"
        operator: "eq"
        value: "byovd_driver_load"
    cooldown: "5m"

  inputs:
    - name: "detection_event"
      type: "object"
      required: true
      description: "The detection event payload from The Body"
    - name: "target_identity"
      type: "string"
      required: true
      description: "The target user or entity identifier"

  steps:
    - id: "step-1"
      name: "block_driver"
      action: "containment"
      target: "EDGE"
      parameters:
          action: "block_driver_hash"
          scope: "org"
      timeout: "30s"
      retry:
        max_attempts: 2
        backoff: "exponential"
      on_failure: "halt"
    - id: "step-2"
      name: "restore_hooks"
      action: "api_call"
      target: "BODY"
      parameters:
          action: "restore_edr_hooks"
          agent: "crowdstrike"
      timeout: "30s"
      retry:
        max_attempts: 2
        backoff: "exponential"
      on_failure: "skip"
    - id: "step-3"
      name: "isolate_if_compromised"
      action: "containment"
      target: "EDGE"
      parameters:
          action: "network_isolate"
          condition: "kernel_tamper_confirmed"
      timeout: "30s"
      retry:
        max_attempts: 2
        backoff: "exponential"
      on_failure: "rollback"

  outputs:
    - name: "containment_status"
      type: "string"
      description: "Final status of the containment action"
    - name: "affected_entities"
      type: "object"
      description: "List of entities affected by the response"

  rollback:
    steps:
      - id: "rollback-1"
        name: "remove_driver_block"
        action: "containment"
        target: "EDGE"
        parameters:
          action: "unblock_driver_hash"

  governance:
    requires_brain_oversight: true
    max_blast_radius: "org"
    audit_level: "verbose"
    human_approval_required: true
