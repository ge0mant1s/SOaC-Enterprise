apiVersion: claw.soac.io/v1
kind: Playbook

metadata:
  name: "seo-poisoning-containment"
  version: "1.0.0"
  author: "SOaC Community"
  created: "2026-03-16T00:00:00Z"
  tags: ["pkg-005", "automated-response"]
  mitre_attack: ["T1189", "T1059.007", "T1071.001"]
  severity: "HIGH"
  package_id: "pkg-005"

spec:
  description: "Block malicious domains, quarantine downloaded payloads, sinkhole C2 infrastructure, and notify affected users."

  trigger:
    source: "BODY"
    conditions:
      - field: "detection_type"
        operator: "eq"
        value: "seo_poisoning_download"
    cooldown: "5m"

  inputs:
    - name: "detection_event"
      type: "object"
      required: true
      description: "The detection event payload from The Body"
    - name: "target_identity"
      type: "string"
      required: true
      description: "The target user or entity identifier"

  steps:
    - id: "step-1"
      name: "block_domain"
      action: "containment"
      target: "EDGE"
      parameters:
          action: "sinkhole_domain"
          scope: "org"
      timeout: "30s"
      retry:
        max_attempts: 2
        backoff: "exponential"
      on_failure: "halt"
    - id: "step-2"
      name: "quarantine_payload"
      action: "containment"
      target: "BODY"
      parameters:
          action: "quarantine_file"
      timeout: "30s"
      retry:
        max_attempts: 2
        backoff: "exponential"
      on_failure: "skip"
    - id: "step-3"
      name: "notify_user"
      action: "notification"
      target: "INTERNAL"
      parameters:
          channel: "#soc-alerts"
          template: "seo_poisoning"
      timeout: "30s"
      retry:
        max_attempts: 2
        backoff: "exponential"
      on_failure: "skip"

  outputs:
    - name: "containment_status"
      type: "string"
      description: "Final status of the containment action"
    - name: "affected_entities"
      type: "object"
      description: "List of entities affected by the response"

  rollback:
    steps:
      - id: "rollback-1"
        name: "unblock_domain"
        action: "containment"
        target: "EDGE"
        parameters:
          action: "remove_sinkhole"

  governance:
    requires_brain_oversight: false
    max_blast_radius: "org"
    audit_level: "verbose"
    human_approval_required: false
