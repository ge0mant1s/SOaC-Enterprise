name: revoke-oauth-and-contain-saas-abuse
version: "1.0.0"
description: |
  Automated response to OAuth abuse and SaaS data exfiltration.
  Revokes malicious consent grants, disables compromised integrations,
  and initiates data loss investigation.
severity: CRITICAL
mitre_attack:
  tactics: [Initial Access, Persistence, Exfiltration]
  techniques: [T1098.003, T1566.002, T1567, T1528, T1530]
trigger:
  source: sentinel_alert
  conditions:
    - alert_type: "oauth_consent_abuse"
      severity: ["critical", "high"]
    - alert_type: "saas_bulk_data_access"
      severity: ["critical"]
  cooldown: 300
inputs:
  malicious_app_id:
    type: string
    description: "Application ID of the malicious OAuth app"
    required: true
  affected_users:
    type: list
    description: "Users who granted consent to the malicious app"
    required: true
  incident_id:
    type: string
    description: "Incident tracking ID"
    required: true
steps:
  - id: revoke_app_consent
    action: azure_ad.revoke_consent
    description: "Revoke all consent grants for the malicious application"
    target: "{{ inputs.malicious_app_id }}"
    parameters:
      revoke_all_users: true
      disable_app: true
      block_future_consent: true
    timeout: 30
    on_failure: alert

  - id: revoke_user_tokens
    action: azure_ad.revoke_tokens
    description: "Revoke all refresh tokens for affected users"
    target: "{{ inputs.affected_users }}"
    parameters:
      revoke_refresh_tokens: true
      force_reauthentication: true
    timeout: 30
    on_failure: alert

  - id: audit_data_access
    action: m365.audit_access
    description: "Audit all data accessed by the malicious application"
    target: "{{ inputs.malicious_app_id }}"
    parameters:
      timerange: "30d"
      include: ["files_accessed", "emails_read", "users_enumerated"]
    timeout: 300
    on_failure: continue

  - id: assess_data_exposure
    action: dlp.assess_impact
    description: "Assess data exposure from the compromised integration"
    target: "{{ steps.audit_data_access.outputs.accessed_resources }}"
    parameters:
      classify_sensitivity: true
      check_external_sharing: true
    timeout: 120
    on_failure: continue

  - id: notify_stakeholders
    action: notification.send
    parameters:
      channels: ["soc_critical", "data_privacy", "legal"]
      template: "saas_oauth_compromise"
      data:
        incident_id: "{{ inputs.incident_id }}"
        malicious_app: "{{ inputs.malicious_app_id }}"
        affected_users: "{{ inputs.affected_users }}"
        data_exposure: "{{ steps.assess_data_exposure.outputs }}"
    timeout: 10
    on_failure: log

outputs:
  consent_revoked: { value: "{{ steps.revoke_app_consent.status }}" }
  data_exposure_assessment: { value: "{{ steps.assess_data_exposure.outputs }}" }

governance:
  requires_ai_oversight: true
  blast_radius: tenant
  approval_required_for: [bulk_consent_revocation]
