apiVersion: soac.io/v1
kind: DetectionRule

metadata:
  name: "seo-poisoning-gootloader-detection"
  version: "1.0.0"
  author: "SOaC Community"
  created: "2026-03-16T00:00:00Z"
  package_id: "pkg-005"
  mitre_attack:
    - technique: "T1189"
      tactic: "Initial Access"
    - technique: "T1059.007"
      tactic: "Execution"
    - technique: "T1071.001"
      tactic: "Command and Control"
  severity: "HIGH"
  confidence: "HIGH"
  tags: ["pkg-005", "initial-access"]

spec:
  description: "Detects SEO poisoning indicators including suspicious search-to-download chains and Gootloader JavaScript execution."

  data_sources:
    - name: "Web proxy logs"
      type: "network"
      fields: ["url", "referer", "content_type", "user_agent"]

  logic:
    type: "correlation"
    timewindow: "5m"
    implementations:
      sigma:
        rule: |
          title: Gootloader SEO Poisoning Download Chain
          status: experimental
          logsource:
            category: proxy
          detection:
            selection_referer:
              referer|contains: google.com/search
            selection_download:
              content_type: application/javascript
              url|endswith: .js
            condition: selection_referer and selection_download
          level: high

  tuning:
    threshold: 1
    whitelist: []
    noise_reduction: "dedup_by_user"

  response:
    playbook: "seo-poisoning-containment"
    escalation: "auto"
    notify: ["soc-team"]

  test_cases:
    - name: "positive-match"
      description: "Simulated initial access event that should trigger alert"
      input:
        event_type: "seo_poisoning_download"
        severity: "HIGH"
      expected_result: "alert"
