name: SaaS Integration Security Governance
version: "1.0.0"
description: Governance policy for SaaS OAuth integrations and API access control.
framework_alignment: [NIST 800-53 AC-6, CIS M365 Benchmark]
oauth_governance:
  user_consent: restricted
  admin_consent_workflow: required
  publisher_verification: required
  scope_restrictions:
    blocked_scopes: [Directory.ReadWrite.All, full_access_as_app, User.ReadWrite.All]
    requires_justification: [Mail.ReadWrite, Files.ReadWrite.All]
  periodic_review: quarterly
api_access_control:
  rate_limiting: enforce
  token_lifetime: 1h
  refresh_token_lifetime: 24h
  ip_restrictions: recommended
data_protection:
  dlp_policies: required
  external_sharing: restricted
  sensitivity_labels: required
metadata:
  package: pkg-005
  mitre_techniques: ["T1098.003", "T1566.002", "T1567", "T1528"]
  last_updated: "2025-03-28"
