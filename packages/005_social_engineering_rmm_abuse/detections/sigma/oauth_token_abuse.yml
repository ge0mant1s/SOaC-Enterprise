title: OAuth Token Abuse - Excessive Permissions and Suspicious Grants
id: f5a6c4d3-7e0b-5g9c-d4f8-6i1d5f0g2e01
status: production
level: high
description: |
  Detects OAuth application consent grants with excessive permissions,
  suspicious scopes, or consent phishing patterns targeting Microsoft 365
  and Google Workspace environments.
author: SOaC Framework
date: 2025/03/15
modified: 2025/03/28
tags:
  - attack.initial_access
  - attack.t1566.002
  - attack.persistence
  - attack.t1098.003
logsource:
  product: azure
  service: auditlogs
detection:
  selection_consent:
    Operation:
      - 'Consent to application'
      - 'Add app role assignment to service principal'
      - 'Add OAuth2PermissionGrant'
  selection_dangerous_scopes:
    ModifiedProperties.NewValue|contains:
      - 'Mail.ReadWrite'
      - 'Files.ReadWrite.All'
      - 'Directory.ReadWrite.All'
      - 'full_access_as_app'
      - 'Sites.ReadWrite.All'
      - 'User.ReadWrite.All'
  filter_known_apps:
    Target.ServicePrincipalId|contains:
      - 'Microsoft Graph Explorer'
      - 'Azure Portal'
  condition: selection_consent and selection_dangerous_scopes and not filter_known_apps
falsepositives:
  - Legitimate enterprise application onboarding
  - Admin consent for approved business applications
