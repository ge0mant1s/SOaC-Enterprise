apiVersion: claw.soac.io/v1
kind: Playbook

metadata:
  name: "revoke-compromised-sessions"
  version: "1.0.0"
  author: "SOaC Community"
  created: "2026-03-16T00:00:00Z"
  tags: ["pkg-001", "automated-response"]
  mitre_attack: ["T1557.001", "T1078.004", "T1539"]
  severity: "CRITICAL"
  package_id: "pkg-001"

spec:
  description: "Revoke all active sessions for a compromised identity across Okta and Azure AD, push edge enforcement, and notify SOC."

  trigger:
    source: "BODY"
    conditions:
      - field: "detection_type"
        operator: "eq"
        value: "aitm_session_hijack"
    cooldown: "5m"

  inputs:
    - name: "detection_event"
      type: "object"
      required: true
      description: "The detection event payload from The Body"
    - name: "target_identity"
      type: "string"
      required: true
      description: "The target user or entity identifier"

  steps:
    - id: "step-1"
      name: "enrich_user"
      action: "api_call"
      target: "BODY"
      parameters:
          endpoint: "/api/v1/users/{userId}"
          method: "GET"
      timeout: "30s"
      retry:
        max_attempts: 2
        backoff: "exponential"
      on_failure: "halt"
    - id: "step-2"
      name: "revoke_okta_sessions"
      action: "containment"
      target: "EDGE"
      parameters:
          endpoint: "/api/v1/users/{userId}/sessions"
          method: "DELETE"
      timeout: "30s"
      retry:
        max_attempts: 2
        backoff: "exponential"
      on_failure: "rollback"
    - id: "step-3"
      name: "notify_soc"
      action: "notification"
      target: "INTERNAL"
      parameters:
          channel: "#soc-critical"
          template: "aitm_incident"
      timeout: "30s"
      retry:
        max_attempts: 2
        backoff: "exponential"
      on_failure: "skip"

  outputs:
    - name: "containment_status"
      type: "string"
      description: "Final status of the containment action"
    - name: "affected_entities"
      type: "object"
      description: "List of entities affected by the response"

  rollback:
    steps:
      - id: "rollback-1"
        name: "restore_sessions"
        action: "api_call"
        target: "BODY"
        parameters:
          action: "restore_user_sessions"

  governance:
    requires_brain_oversight: true
    max_blast_radius: "org"
    audit_level: "verbose"
    human_approval_required: true
