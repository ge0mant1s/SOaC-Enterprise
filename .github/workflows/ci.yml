name: CI — validate / test / build

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches:
      - main
      - "session-*"
  workflow_dispatch:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - run: npm ci

      - run: npm run lint

      - run: npm test

      - name: Validate packages (Harness v3)
        run: npx -y ts-node --transpile-only scripts/validate-packages.ts

      - run: npm run build
