name: SOaC Gatekeeper (Harness v3.0)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          # Removed 'cache: npm' to avoid the "lock file not found" error 
          # until you commit your package-lock.json
          
      - name: Install Dependencies
        run: npm install # Use 'install' instead of 'ci' if lockfile is missing
        
      - name: 🛡️ Harness v3.0 Validation
        run: npx ts-node scripts/validate-packages.ts
        continue-on-error: false # Fail the build if a package is invalid

      - name: 🧪 Unit Tests
        run: npm test
