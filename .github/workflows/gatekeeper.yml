name: SOaC Gatekeeper (Harness v3.0)

on:
  pull_request:
    branches: [ main ]
  push:
    branches:
      - main
      - "session-*"
  workflow_dispatch:

jobs:
  validate-and-test:
    name: Validate & Test (tools/soac-harness)
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          check-latest: false

      - name: Cache npm & node_modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            tools/soac-harness/node_modules
          key: ${{ runner.os }}-soac-harness-${{ hashFiles('tools/soac-harness/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-soac-harness-

      - name: Install dependencies (use CI if lockfile exists)
        working-directory: tools/soac-harness
        run: |
          if [ -f package-lock.json ]; then
            echo "package-lock.json found — using npm ci"
            npm ci
          else
            echo "package-lock.json NOT found — using npm install"
            npm install
          fi

      - name: Run unit tests
        working-directory: tools/soac-harness
        run: npm test

      - name: Harness v3.0 validation (schema + package checks)
        working-directory: tools/soac-harness
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'
        run: |
          npx -y ts-node --transpile-only scripts/validate-packages.ts

      - name: Build
        working-directory: tools/soac-harness
        run: npm run build
