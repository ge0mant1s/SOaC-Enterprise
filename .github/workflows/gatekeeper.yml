name: SOaC Gatekeeper (Harness v3.0)

on:
  pull_request:
    branches: [ main ]
  push:
    branches:
      - main
      - "session-*"
  workflow_dispatch:

jobs:
  validate-and-test:
    name: Validate & Test (tools/soac-harness)
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout repository (full fetch)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Auto-Fix GovernancePolicy Kind
        run: |
          echo "Normalizing GovernancePolicy -> Policy..."
          # Find all YAML files and replace the kind string
          find packages -type f \( -name "*.yaml" -o -name "*.yml" \) -exec sed -i 's/kind: GovernancePolicy/kind: Policy/g' {} +
          
          # Commit changes if any were made
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packages/
          if ! git diff --cached --quiet; then
            git commit -m "fix: normalize GovernancePolicy to Policy kind"
            git push
          else
            echo "No kind changes needed."
          fi

      - name: Install YAML Validator
        run: pip install ruamel.yaml

      - name: Strict YAML Duplicate Key Check
        run: |
          python3 -c "
          import glob, sys
          from ruamel.yaml import YAML
          yaml = YAML()
          errors = 0
          files = glob.glob('packages/**/*.yml', recursive=True) + glob.glob('packages/**/*.yaml', recursive=True)
          for f in files:
              try:
                  with open(f, 'r') as stream:
                      yaml.load(stream)
              except Exception as e:
                  print(f'❌ YAML Error in {f}: {e}')
                  errors += 1
          if errors > 0:
              print(f'\nTotal Errors: {errors}')
              sys.exit(1)
          print('✅ All YAML files are syntactically valid.')
          "

      - name: Install Harness Dependencies
        working-directory: tools/soac-harness
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Run SOaC Harness Validation
        working-directory: tools/soac-harness
        run: |
          npx ts-node src/index.ts validate --path ../../packages --level 2

      - name: Harness v3.0 validation (schema + package checks)
        working-directory: tools/soac-harness
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'
        run: |
          npx -y ts-node --transpile-only scripts/validate-packages.ts
