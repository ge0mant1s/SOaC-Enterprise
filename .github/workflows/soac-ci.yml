# ============================================================================
# SOaC-Enterprise CI Pipeline
# ============================================================================
# Runs on every push and PR to main.
# Steps:
#   1. Checkout
#   2. Install harness dependencies
#   3. Level 1+2 — Schema + Cross-Reference validation on core/templates
#   4. Level 1+2 — Schema + Cross-Reference validation on test-fixtures
#   5. Generate combined JSON report
#   6. Upload validation report as artifact
#
# NOTE (M2): packages/** validation is intentionally excluded until M3
#   completes package standardization. When M3 lands, add 'packages/**'
#   back to paths triggers and add a "Validate packages" step scanning
#   --path ../../packages --level 2.
# ============================================================================

name: SOaC Harness CI

on:
  push:
    branches: [main]
    paths:
      - 'core/templates/**'
      - 'tools/soac-harness/**'
  pull_request:
    branches: [main]
    paths:
      - 'core/templates/**'
      - 'tools/soac-harness/**'
  workflow_dispatch:  # manual trigger

jobs:
  validate:
    name: SOaC Harness — Level 1 + 2
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: tools/soac-harness/package.json

      - name: Install harness dependencies
        working-directory: tools/soac-harness
        run: npm install

      - name: Validate core templates (L1 + L2)
        working-directory: tools/soac-harness
        run: |
          echo "## Core Templates — Level 1 + 2" >> $GITHUB_STEP_SUMMARY
          npx ts-node src/index.ts validate --path ../../core/templates --level 2 --format text 2>&1 | tee /tmp/templates-report.txt
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat /tmp/templates-report.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Validate harness test-fixtures (L1 + L2)
        working-directory: tools/soac-harness
        run: |
          echo "## Harness Test Fixtures — Level 1 + 2" >> $GITHUB_STEP_SUMMARY
          npx ts-node src/index.ts validate --path test-fixtures --level 2 --format text 2>&1 | tee /tmp/fixtures-report.txt || true
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat /tmp/fixtures-report.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Generate JSON report
        if: always()
        working-directory: tools/soac-harness
        run: |
          echo '{"core_templates":' > /tmp/harness-report.json
          npx ts-node src/index.ts validate --path ../../core/templates --level 2 --format json 2>/dev/null >> /tmp/harness-report.json || echo '{}' >> /tmp/harness-report.json
          echo ',"test_fixtures":' >> /tmp/harness-report.json
          npx ts-node src/index.ts validate --path test-fixtures --level 2 --format json 2>/dev/null >> /tmp/harness-report.json || echo '{}' >> /tmp/harness-report.json
          echo '}' >> /tmp/harness-report.json

      - name: Upload validation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: soac-harness-report
          path: /tmp/harness-report.json
          retention-days: 30
