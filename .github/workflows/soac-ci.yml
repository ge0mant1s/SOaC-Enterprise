# ============================================================================
# SOaC-Enterprise CI Pipeline
# ============================================================================
# Runs on every push and PR to main when harness source or package artifacts
# change.
#
# Strategy (M3):
#   - Validate test-fixtures/valid-*.yaml   → MUST pass (exit 0)
#   - Validate test-fixtures/invalid-*.yaml → MUST fail (exit 1, negative test)
#   - Validate packages/**/metadata.yml, detection.yaml, playbook.yaml,
#     policy.yaml → MUST pass Level 1 + 2 (contract compliance)
#   - core/templates/** excluded — templates contain placeholder fields that
#     intentionally fail strict schema validation.
# ============================================================================

name: SOaC Harness CI

on:
  push:
    branches: [main]
    paths:
      - 'tools/soac-harness/**'
      - 'packages/**'
  pull_request:
    branches: [main]
    paths:
      - 'tools/soac-harness/**'
      - 'packages/**'
  workflow_dispatch:  # manual trigger

jobs:
  validate:
    name: SOaC Harness — Level 1 + 2
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: tools/soac-harness/package.json

      - name: Install harness dependencies
        working-directory: tools/soac-harness
        run: npm install

      # ── Positive tests: valid fixtures MUST pass ──────────────
      - name: "Validate valid fixtures (MUST pass)"
        working-directory: tools/soac-harness
        run: |
          echo "## Valid Fixtures — Level 1 + 2 (expect PASS)" >> $GITHUB_STEP_SUMMARY
          VALID_FILES=$(find test-fixtures -name 'valid-*.yaml' -type f | sort)
          EXIT=0
          for f in $VALID_FILES; do
            echo "→ $f"
            npx ts-node src/index.ts validate --path "$f" --level 2 --format text 2>&1 | tee -a /tmp/valid-report.txt
            if [ ${PIPESTATUS[0]} -ne 0 ]; then
              echo "::error::$f was expected to PASS but FAILED"
              EXIT=1
            fi
          done
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat /tmp/valid-report.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          exit $EXIT

      # ── Negative tests: invalid fixtures MUST fail ────────────
      - name: "Validate invalid fixtures (MUST fail — negative test)"
        working-directory: tools/soac-harness
        run: |
          echo "## Invalid Fixtures — Level 1 + 2 (expect FAIL)" >> $GITHUB_STEP_SUMMARY
          INVALID_FILES=$(find test-fixtures -name 'invalid-*.yaml' -type f | sort)
          EXIT=0
          for f in $INVALID_FILES; do
            echo "→ $f"
            npx ts-node src/index.ts validate --path "$f" --level 2 --format text 2>&1 | tee -a /tmp/invalid-report.txt
            if [ ${PIPESTATUS[0]} -eq 0 ]; then
              echo "::error::$f was expected to FAIL but PASSED — negative test broken"
              EXIT=1
            else
              echo "✓ $f correctly rejected"
            fi
          done
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat /tmp/invalid-report.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          exit $EXIT

      # ── Package artifact validation (M3) ─────────────────────
      - name: "Validate package artifacts (MUST pass)"
        working-directory: tools/soac-harness
        run: |
          echo "## Package Artifacts — Level 1 + 2 (expect PASS)" >> $GITHUB_STEP_SUMMARY
          PKG_FILES=$(find ../../packages -type f \( -name '*.yaml' -o -name '*.yml' \) | sort)
          if [ -z "$PKG_FILES" ]; then
            echo "⚠ No package artifacts found — skipping"
            exit 0
          fi
          EXIT=0
          for f in $PKG_FILES; do
            echo "→ $f"
            npx ts-node src/index.ts validate --path "$f" --level 2 --format text 2>&1 | tee -a /tmp/pkg-report.txt
            if [ ${PIPESTATUS[0]} -ne 0 ]; then
              echo "::error::$f FAILED contract validation"
              EXIT=1
            fi
          done
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat /tmp/pkg-report.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          exit $EXIT

      # ── JSON report artifact ──────────────────────────────────
      - name: Generate JSON report
        if: always()
        working-directory: tools/soac-harness
        run: |
          echo '{"valid_fixtures":' > /tmp/harness-report.json
          VALID_FILES=$(find test-fixtures -name 'valid-*.yaml' -type f -printf '%p ' 2>/dev/null || find test-fixtures -name 'valid-*.yaml' -type f | tr '\n' ' ')
          npx ts-node src/index.ts validate --path test-fixtures --level 2 --format json 2>/dev/null >> /tmp/harness-report.json || echo '{}' >> /tmp/harness-report.json
          echo '}' >> /tmp/harness-report.json

      - name: Upload validation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: soac-harness-report
          path: /tmp/harness-report.json
          retention-days: 30
